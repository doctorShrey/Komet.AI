name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main  # This triggers the build whenever you push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # Use your local node version

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Generate PHP Config
        run: |
          mkdir -p ./dist/api
          cat << 'EOF' > ./dist/api/config.php
          <?php
          define('SMTP_HOST', '${{ secrets.SMTP_HOST }}');
          define('SMTP_PORT', ${{ secrets.SMTP_PORT }});
          define('SMTP_USER', '${{ secrets.SMTP_USER }}');
          define('SMTP_PASS', '${{ secrets.SMTP_PASS }}');
          define('ADMIN_EMAIL', '${{ secrets.ADMIN_EMAIL }}');
          ?>
          EOF

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./dist/ 
          server-dir: /public_html/
          overwrite: true
          dry-run: false